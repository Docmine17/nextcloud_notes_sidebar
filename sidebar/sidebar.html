<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextcloud Notes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .message-container {
            margin-top: 50px;
        }
        button {
            background-color: #0082c9;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #006da8;
        }
    </style>
</head>
<body>
    <div class="message-container" id="message-container">
        <h2>Bem-vindo!</h2>
        <p>Por favor, configure a URL do seu Nextcloud Notes para começar a usar a barra lateral.</p>
        <button id="open-options">Abrir Configurações</button>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
